services:
  oxoora:
    image: ${IMAGE_NAME:-oxoora:latest}
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATA_DIR: /app/data
      UPLOAD_DIR: /app/product-uploads
      ADMIN_ID: ${ADMIN_ID:-HIMANSHU}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-9680706015}
    volumes:
      - oxoora-data:/app/data
      - oxoora-uploads:/app/product-uploads

volumes:
  oxoora-data:
  oxoora-uploads:
