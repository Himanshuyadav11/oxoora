services:
  oxoora:
    image: ${IMAGE_NAME:-oxoora:latest}
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATA_DIR: /app/data
      UPLOAD_DIR: /app/product-uploads
      ADMIN_ID: ${ADMIN_ID:-HIMANSHU}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-9680706015}
    volumes:
      - ../data:/app/data
      - ../product-uploads:/app/product-uploads
